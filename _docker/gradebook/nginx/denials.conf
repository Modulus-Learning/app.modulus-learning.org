
## NOTE: 2026-02-15
## Changed from 444 to 403 to avoid Fly.io proxy logging
# Why 403? It sends a valid "Forbidden" HTTP header. 
# The Fly.io proxy sees this as a successful valid response (status 403), 
# eliminating the "Connection reset" error log while still blocking the bot.
# 444 - Nginx's return 444 strictly closes the TCP connection without sending a 
# response. The Fly.io proxy interprets this abrupt closure as a server failure.

## See the blacklist.conf file at the parent dir: /etc/nginx.
## Deny access based on the User-Agent header.
if ($bad_bot) {
  return 403;
}
## Deny access based on the Referer header.
if ($bad_referer) {
    return 403;
}

## Protection against illegal HTTP methods. Out of the box only HEAD,
## GET and POST are allowed.
