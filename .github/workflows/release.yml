name: Release

on:
  push:
    branches:
      - main

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      repository-projects: write
    steps:
      - name: Checkout Repo
        uses: actions/checkout@v4
        with:
          # This makes the context of this action to be the merge commit itself
          # instead of the HEAD of the branch.
          # This is needed for the changeset action to be able to find the
          # changeset files.
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Install Dependencies
        run: pnpm install

      - name: Create Release Pull Request or Publish to npm
        id: changesets
        uses: changesets/action@v1
        with:
          # This will run `pnpm changeset publish` if a new version is released.
          # UPDATED: 2025-10-15 - we now call release:npm (and not just release:tag)
          publish: pnpm run release:npm
          commit: "chore: update package versions"
          title: "chore: update package versions"
        env:
          # The GITHUB_TOKEN is automatically generated by GitHub and is used by the
          # changesets action to create commits and pull requests.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # The NPM_TOKEN is a secret that you need to create in your repository settings.
          # It is used to authenticate with npm to publish the package.
          # 1. Generate a token at https://www.npmjs.com/settings/your-username/tokens
          # 2. Select "Granular Access Token". This is more secure.
          # 3. Give it "Read and Write" permissions for the specific `@modulus-learning` package.
          # 4. Add it to your GitHub repository secrets as NPM_TOKEN
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        
      # ===================================================================
      # ====== 🚀 NEW STEPS TO ZIP AND UPLOAD YOUR PACKAGE ARTIFACT ======
      # ===================================================================

      # This step only runs if the changesets action actually published a new version.
      - name: Get Package Info
        id: package-info
        if: steps.changesets.outputs.published == 'true'
        run: |
          # ❗️ IMPORTANT: Replace 'packages/your-app' with the path to your package.
          PACKAGE_JSON_PATH="apps/agent/package.json"
          
          PACKAGE_NAME=$(jq -r .name "$PACKAGE_JSON_PATH")
          PACKAGE_VERSION=$(jq -r .version "$PACKAGE_JSON_PATH")

          # ❗️ FIXED: Sanitize the package name for the filename
          # This turns '@modulus-learning/agent' into 'modulus-agent'
          FILENAME_SAFE_NAME=$(echo "$PACKAGE_NAME" | tr -d '@' | tr '/' '-')

          # The tag name should still use the original scoped name
          echo "tag_name=$PACKAGE_NAME@$PACKAGE_VERSION" >> $GITHUB_OUTPUT
          
          # The zip name now uses the sanitized version
          echo "zip_name=$FILENAME_SAFE_NAME-v$PACKAGE_VERSION.zip" >> $GITHUB_OUTPUT
          
          echo "dist_path=apps/agent/dist" >> $GITHUB_OUTPUT

      - name: Create Zip Archive
        if: steps.changesets.outputs.published == 'true'
        run: |
          cd ${{ steps.package-info.outputs.dist_path }}
          zip -r ../../../${{ steps.package-info.outputs.zip_name }} .
      
      - name: Upload Zip to Release
        if: steps.changesets.outputs.published == 'true'
        env:
          # The GH_TOKEN is necessary for the GitHub CLI to authenticate.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload ${{ steps.package-info.outputs.tag_name }} ${{ steps.package-info.outputs.zip_name }} --clobber