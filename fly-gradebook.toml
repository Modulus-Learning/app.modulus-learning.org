[http_service]
internal_port = 8000
force_https = true
auto_stop_machines = true
auto_start_machines = true
min_machines_running = 1
processes = ['app']

[[http_service.checks]]
interval = '30s'
timeout = '5s'
grace_period = '10s'
method = 'GET'
path = '/routes/elb-status'

[[vm]]
size = 'shared-cpu-2x'
memory = "1024mb"
cpu_kind = 'shared'
cpus = 2
