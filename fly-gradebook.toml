app = 'modulus-restless-snowflake-2677'
primary_region = 'sin'
swap_size_mb = 512

[build]
dockerfile = '_docker/gradebook/production/Dockerfile'

[build.args]
APP_VOLUME = '/app/storage'
IMAGE_VOLUME = '/app/apps/next/.next/cache/images'

[deploy]
strategy = 'rolling'

[env]
PORT = '3000'
NEXT_PUBLIC_SITE_NAME = 'MODULUS'
NEXT_PUBLIC_SITE_DESCRIPTION = 'Modulus - an open source educational analytics system for distributed learning content.'
NEXT_PUBLIC_PUBLIC_SERVER_URL = 'https://app.modulus-learning.org'
NEXT_PUBLIC_CSP_ENABLED = 'false'
DATA_REQUEST_CACHING = 'true'
ANALYTICS_ENABLED = 'true'

USER_SESSION_COOKIE_NAME = 'user_session'
USER_SESSION_COOKIE_SAME_SITE = 'none'
USER_SESSION_COOKIE_HTTP_ONLY = 'true'
USER_SESSION_COOKIE_SECURE = 'true'

USER_REFRESH_COOKIE_NAME = 'user_refresh'
USER_REFRESH_COOKIE_SAME_SITE = 'none'
USER_REFRESH_COOKIE_HTTP_ONLY = 'true'
USER_REFRESH_COOKIE_SECURE = 'true'

ADMIN_SESSION_COOKIE_NAME = 'admin_session'
ADMIN_SESSION_COOKIE_SAME_SITE = 'lax'
