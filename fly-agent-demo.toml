# fly.toml app configuration file generated for modulus-agent-demo on 2024-08-01T15:13:02+07:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'modulus-agent-demo'
primary_region = 'sin'

[build]
  dockerfile = '_docker/agent-demo/production/Dockerfile'

[deploy]
  strategy = 'rolling'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '30s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/elb-status'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
